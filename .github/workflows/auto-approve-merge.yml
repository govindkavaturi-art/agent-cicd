name: Auto-Approve Bot PR

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  auto-approve:
    if: false  # Remove this line when using in your own repo. Replace with: github.actor == 'YOUR_BOT_USERNAME'
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: gh pr review ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --approve
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --merge --auto
